version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: removeanything-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=${MODEL_NAME:-hybrid}
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-20971520}
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - model_cache:/app/models/cache
      - logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: removeanything-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: removeanything-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  uploads:
  outputs:
  model_cache:
  logs:
  ssl_certs:
