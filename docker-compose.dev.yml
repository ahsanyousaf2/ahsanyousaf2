version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: removeanything-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=hybrid
      - DEVICE=cpu
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - outputs:/app/outputs
      - model_cache:/app/models/cache
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: removeanything-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  uploads:
  outputs:
  model_cache:
